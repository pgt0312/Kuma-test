# PlayMCP 모니터링 — InferenceService 참고 (Git 빌드 이미지와 이름 일치)
# metadata.name = PlayMCP「MCP 서버 이름」csap-node-escape-probe
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: csap-node-escape-probe
  namespace: REPLACE_NAMESPACE
spec:
  predictor:
    containers:
      - name: kserve-container
        image: REPLACE_REGISTRY/csap-node-escape-probe:playmcp-git
        ports:
          - name: user-port
            containerPort: 8000
        env:
          - name: PORT
            value: "8000"
          - name: MCP_SERVER_NAME
            value: "csap-node-escape-probe"
          - name: RUN_PROBE_ON_START
            value: "0"
        readinessProbe:
          tcpSocket:
            port: user-port
        livenessProbe:
          tcpSocket:
            port: user-port
