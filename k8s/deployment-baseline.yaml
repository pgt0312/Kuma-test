# 기본(상대적으로 안전) 프로파일 — 이스케이프가 어려워야 정상
apiVersion: apps/v1
kind: Deployment
metadata:
  name: csap-escape-probe-baseline
  labels:
    app: csap-escape-probe
    profile: baseline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csap-escape-probe
      profile: baseline
  template:
    metadata:
      labels:
        app: csap-escape-probe
        profile: baseline
    spec:
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: probe
          image: csap-node-escape-probe:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: user-port
              containerPort: 8000
          env:
            - name: PORT
              value: "8000"
            - name: RUN_PROBE_ON_START
              value: "0"
            - name: ENABLE_ACTIVE_TESTS
              value: "0"
            - name: PROBE_IMAGE_TAG
              value: "baseline"
            - name: MCP_SERVER_NAME
              value: "csap-node-escape-probe"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: PROBE_MIN_INTERVAL_SEC
              value: "60"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: reports
              mountPath: /data/reports
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: user-port
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: reports
          emptyDir: {}
