# PlayMCP Git 소스 빌드 후 모니터링 탭용 InferenceService
# 적용: scripts/apply-inferenceservice-for-playmcp.sh (envsubst)
#
# metadata.name MUST equal PlayMCP「MCP 서버 이름」and API endpoint_name
---
apiVersion: ${KSERVE_API_VERSION}
kind: InferenceService
metadata:
  name: ${MCP_NAME}
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: ${MCP_NAME}
    app.kubernetes.io/component: mcp-server
    csap.playmcp/managed-by: apply-inferenceservice-script
spec:
  predictor:
    serviceAccountName: ${SERVICE_ACCOUNT_NAME}
    containers:
      - name: kserve-container
        image: ${CONTAINER_IMAGE}
        imagePullPolicy: IfNotPresent
        ports:
          - name: user-port
            containerPort: 8000
            protocol: TCP
        env:
          - name: PORT
            value: "8000"
          - name: MCP_SERVER_NAME
            value: "${MCP_NAME}"
          - name: MCP_SERVER_VERSION
            value: "2.1.1-playmcp-git"
          - name: PROBE_REPORT_DIR
            value: "/data/reports"
          - name: ENABLE_ACTIVE_TESTS
            value: "0"
          - name: ENABLE_SAFE_NET_CHECKS
            value: "0"
          - name: PROBE_MIN_INTERVAL_SEC
            value: "60"
          - name: RUN_PROBE_ON_START
            value: "0"
          - name: ENV_PROFILE
            value: "playmcp"
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
        readinessProbe:
          tcpSocket:
            port: user-port
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: user-port
          initialDelaySeconds: 20
          periodSeconds: 20
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 10001
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
